    <script>
      // QR recovery — if the URL is missing the hash but still contains
      // a token (e.g. "?token=ABC" or a path "/qr/ABC" with no hash),
      // normalise it into the canonical "#/qr/<token>" form so the SPA
      // short-circuit fires. This protects against chat apps / browsers
      // that strip the hash fragment on copy.
      (function () {
        try {
          var loc = window.location;
          var path = loc.pathname || "/";
          var hash = loc.hash || "";
          var query = loc.search || "";
          function pickTokenFromQuery(q) {
            try {
              var params = new URLSearchParams(q);
              return (
                params.get("token") ||
                params.get("t") ||
                params.get("qr") ||
                null
              );
            } catch (e) {
              return null;
            }
          }
          // Path forms we recognise: /qr/TOKEN, /menu/TOKEN,
          // /order/TOKEN, /customer/TOKEN.
          var m = path.match(/^\/(?:qr|menu|order|customer)\/([^/?#]+)/);
          // Only act when the hash is empty (i.e. the hash has been
          // stripped by whatever copied the URL).
          if (!hash && m && m[1]) {
            var token = decodeURIComponent(m[1]);
            var target = "/#/qr/" + token;
            window.location.replace(target);
            return;
          }
          // Or a `?token=...` query string.
          if (!hash && query) {
            var qToken = pickTokenFromQuery(query);
            if (qToken) {
              window.location.replace("/#/qr/" + qToken);
              return;
            }
          }
          // Or a bare /qr/TOKEN that lost the hash. Same as above.
          if (!hash && /^qr\/[A-Za-z0-9_-]+/.test(path.replace(/^\//, ""))) {
            var t2 = path.replace(/^\//, "").split("/")[1];
            if (t2) {
              window.location.replace("/#/qr/" + t2);
              return;
            }
          }
        } catch (e) {
          /* ignore — fallback to the SPA's own short-circuit */
        }
      })();
    </script>
